function displayAgeInMonths(){
    // get age from local storage 
    let stroredUser = localStorage.getItem("adultAgilityUser")

    if (!stroredUser){console.log("No user data found");
        return;
    }

    let user = JSON.parse(stroredUser);
    //convert strinh to number
    let ageInYears = Number(user.age)
    //convert years to months
    let ageInMonths = ageInYears * 12;

    const ageElement = document.querySelector("ageInMonths");

    if (ageElement){
        ageElement.textContent = ageInMonths + "months";
    }
}
