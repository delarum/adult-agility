<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Adult Agility</title>
    <script src="project.js"></script>
    <style>
        body {
            background: #0B0F14;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: #11161D;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 25px rgba(255, 92, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            background: linear-gradient(90deg, #FFB300, #FF5C00);
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Sign Up</h2>

        <form id="signupForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="number" id="age" placeholder="Your Age" required>
            <button type="submit">Submit</button>
        </form>
        <div class="saved-data" id="savedData"></div>

    </div>


</body>

</html>
